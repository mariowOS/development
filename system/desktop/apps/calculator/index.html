<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice Dark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenitore principale: adattato per riempire la finestra dell'ambiente desktop */
        .calculator {
            background-color: #1e1e1e;
            width: 100%;
            height: 100%;
            padding: 40px 28px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Display del risultato */
        .display {
            color: #ffffff;
            font-size: 75px;
            font-weight: 400;
            text-align: right;
            padding: 10px;
            margin-bottom: 20px;
            line-height: 1.1;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* Griglia dei pulsanti */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        /* Stile base dei pulsanti */
        .btn {
            background-color: #505050;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            font-weight: 500;
            aspect-ratio: 1;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s ease;
        }

        .btn:active {
            background-color: #656565;
        }

        /* Configurazione speciale per il tasto "0" */
        .btn-zero {
            grid-column: span 2;
            border-radius: 50px;
            aspect-ratio: auto;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display" id="display">0</div>

        <div class="buttons-grid">
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn" onclick="setOperator('*')">*</button>

            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn" onclick="setOperator('/')">/</button>

            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn" onclick="setOperator('-')">-</button>

            <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="calculate()">=</button>
            <button class="btn" onclick="setOperator('+')">+</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';
        let firstOperand = null;
        let operator = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.innerText = currentInput;
        }

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = number;
                shouldResetDisplay = false;
            } else {
                if (currentInput.length < 9) {
                    currentInput += number;
                }
            }
            updateDisplay();
        }

        function setOperator(nextOperator) {
            const inputValue = parseFloat(currentInput);

            if (operator && shouldResetDisplay) {
                operator = nextOperator;
                return;
            }

            if (firstOperand === null) {
                firstOperand = inputValue;
            } else if (operator) {
                const result = performCalculation(operator, firstOperand, inputValue);
                currentInput = String(result);
                firstOperand = result;
                updateDisplay();
            }

            shouldResetDisplay = true;
            operator = nextOperator;
        }

        function calculate() {
            if (!operator || shouldResetDisplay) return;

            const inputValue = parseFloat(currentInput);
            const result = performCalculation(operator, firstOperand, inputValue);
            
            currentInput = String(result);
            firstOperand = null;
            operator = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function performCalculation(op, first, second) {
            switch (op) {
                case '+': return first + second;
                case '-': return first - second;
                case '*': return first * second;
                case '/': return second !== 0 ? first / second : 'Error';
                default: return second;
            }
        }
        
        display.addEventListener('click', () => {
            currentInput = '0';
            firstOperand = null;
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        });
    </script>
</body>
</html>
