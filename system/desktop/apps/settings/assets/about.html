<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>About mariowOS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --text: #ffffff;
    --text-muted: #8e8e93;
  }

  html, body {
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: 'Poppins', sans-serif;
    color: var(--text);
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .container {
    max-width: 600px;
    width: 100%;
    box-sizing: border-box;
  }

  .brand-header {
    text-align: center;
    padding: 10px 0 24px 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .brand-header img {
    max-width: 280px;
    height: auto;
    display: block;
  }

  .info-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    box-sizing: border-box;
    width: 100%;
  }

  .info-box .title {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 14px 0;
    color: var(--text);
  }

  .info-box .content {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
  }

  .info-row:first-child { padding-top: 0; }
  .info-row:last-child { padding-bottom: 0; }

  .info-row .label {
    font-weight: 500;
    color: rgba(255, 255, 255, 0.9);
  }

  .info-row .value {
    color: var(--text-muted);
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="brand-header">
    <img src="branding.png" alt="mariowOS">
  </div>

  <div class="info-box">
    <div class="info-row">
      <span class="label">System version</span>
      <span class="value">1.0.0</span>
    </div>
    <div class="info-row">
      <span class="label">Kernel</span>
      <span class="value">0.4-mainstream (node)</span>
    </div>
    <div class="info-row">
      <span class="label">Engine</span>
      <span class="value">Lillium Engine</span>
    </div>
    <div class="info-row">
      <span class="label">Build Date</span>
      <span class="value">7 June 2026 | 7:07PM</span>
    </div>
  </div>

  <div class="info-box">
    <div class="title">Credits</div>
    <div class="content">
      <strong style="color: var(--text);">Main owner:</strong> mariowstech<br>
      <strong style="color: var(--text);">Developers:</strong> kianish, davidjone16, ertyplax<br>
      <strong style="color: var(--text);">Contributors:</strong> kevadesu
    </div>
  </div>

</div>

</body>
</html>
