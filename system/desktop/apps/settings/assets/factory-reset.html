<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Reset</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
  }
  
  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; color: var(--red); }
  
  p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    background: rgba(255, 59, 48, 0.15);
    color: var(--red);
    border: 1px solid rgba(255, 59, 48, 0.3);
  }

  .btn:hover { background: rgba(255, 59, 48, 0.25); }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

  <div class="card">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Factory Reset</h2>
    </div>
    
    <p><strong>WARNING:</strong> This action is permanent. It will erase all your personal data, installed applications, and configurations. The system will be restored to its original factory state.</p>

    <button class="btn" onclick="factoryReset()">Erase All Data</button>
  </div>

<script>
function factoryReset() {
  if (confirm("WARNING: This will erase ALL data. Are you absolutely sure?")) {
    window.parent.postMessage({ type: 'clear-settings' }, '*');
    alert("Factory reset initiated. System will reboot.");
    setTimeout(() => {
      window.parent.location.href = window.parent.location.href;
    }, 1000);
  }
}
</script>

</body>
</html>
