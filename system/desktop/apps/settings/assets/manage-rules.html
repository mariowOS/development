<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Rules</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .container {
    max-width: 600px;
    position: relative;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }

  .rule-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
  }

  .rule-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .rule-desc {
    font-size: 13px;
    color: var(--text-muted);
  }

  .rule-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    background: rgba(255, 255, 255, 0.08);
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: rgba(255, 255, 255, 0.15); }
  .btn:active { transform: scale(0.95); }

  .btn-edit { color: var(--accent); }
  .btn-delete { color: var(--red); }
  
  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Manage Rules</h2>
    </div>

    <div id="rulesContainer">
      <!-- Rules loaded here -->
    </div>
  </div>

<script>
const rulesContainer = document.getElementById('rulesContainer');

function loadRules() {
  const rules = JSON.parse(localStorage.getItem('rules')) || [];
  rulesContainer.innerHTML = '';

  if (rules.length === 0) {
    rulesContainer.innerHTML = '<div class="empty-state">No rules found. Create a new rule first.</div>';
    return;
  }

  rules.forEach(rule => {
    const ruleItem = document.createElement('div');
    ruleItem.className = 'rule-item';
    ruleItem.innerHTML = `
      <div>
        <div class="rule-title">${rule.name}</div>
        <div class="rule-desc">Trigger: ${rule.trigger} | Action: ${rule.action}</div>
      </div>
      <div class="rule-actions">
        <button class="btn btn-edit" data-id="${rule.id}">Edit</button>
        <button class="btn btn-delete" data-id="${rule.id}">Delete</button>
      </div>
    `;
    rulesContainer.appendChild(ruleItem);
  });

  document.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const ruleId = parseInt(e.target.dataset.id);
      window.location.href = `new-rule.html?edit=${ruleId}`;
    });
  });

  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (confirm('Are you sure you want to delete this rule?')) {
        const ruleId = parseInt(e.target.dataset.id);
        deleteRule(ruleId);
      }
    });
  });
}

function deleteRule(ruleId) {
  let rules = JSON.parse(localStorage.getItem('rules')) || [];
  const ruleName = rules.find(r => r.id === ruleId)?.name || 'Unknown';
  rules = rules.filter(r => r.id !== ruleId);
  localStorage.setItem('rules', JSON.stringify(rules));

  let history = JSON.parse(localStorage.getItem('ruleHistory')) || [];
  history.push({
    id: Date.now(),
    ruleName: ruleName,
    action: 'Deleted',
    timestamp: new Date().toISOString()
  });
  localStorage.setItem('ruleHistory', JSON.stringify(history));

  loadRules();
}

loadRules();
</script>

</body>
</html>
