<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Rule</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }
  
  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  input, select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  select { appearance: none; }
  select option { background: #1e1e1e; color: var(--text); }
  input::placeholder { color: #555; }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 10px;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }

  #errorMsg {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2 id="pageTitle">Create New Rule</h2>
    </div>

    <form id="ruleForm">
      <div class="form-group">
        <label for="ruleName">Rule Name</label>
        <input type="text" id="ruleName" placeholder="e.g. Night Mode">
      </div>

      <div class="form-group">
        <label for="trigger">Trigger</label>
        <select id="trigger">
          <option value="">Select a trigger</option>
          <option value="time">Time-based</option>
          <option value="event">Event-based</option>
          <option value="condition">Condition-based</option>
        </select>
      </div>

      <div class="form-group">
        <label for="action">Action</label>
        <select id="action">
          <option value="">Select an action</option>
          <option value="notify">Send notification</option>
          <option value="run">Run command</option> 
        </select>
      </div>

      <button type="submit" class="btn" id="submitBtn">Save Rule</button>
      <div id="errorMsg"></div>
    </form>
  </div>

<script>
const form = document.getElementById('ruleForm');
let editId = null;

// Check if we are editing
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('edit')) {
  editId = parseInt(urlParams.get('edit'));
  document.getElementById('pageTitle').textContent = "Edit Rule";
  const rules = JSON.parse(localStorage.getItem('rules')) || [];
  const rule = rules.find(r => r.id === editId);
  
  if (rule) {
    document.getElementById('ruleName').value = rule.name;
    document.getElementById('trigger').value = rule.trigger;
    document.getElementById('action').value = rule.action;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const ruleName = document.getElementById('ruleName').value.trim();
  const trigger = document.getElementById('trigger').value;
  const action = document.getElementById('action').value;
  const errorMsg = document.getElementById('errorMsg');

  if (!ruleName || !trigger || !action) {
    errorMsg.textContent = 'Please fill in all fields.';
    return;
  }
  
  errorMsg.textContent = '';

  let rules = JSON.parse(localStorage.getItem('rules')) || [];
  
  if (editId) {
    const idx = rules.findIndex(r => r.id === editId);
    if (idx !== -1) {
      rules[idx].name = ruleName;
      rules[idx].trigger = trigger;
      rules[idx].action = action;
    }
  } else {
    const rule = {
      id: Date.now(),
      name: ruleName,
      trigger: trigger,
      action: action,
      enabled: true,
      created: new Date().toISOString()
    };
    rules.push(rule);
  }

  localStorage.setItem('rules', JSON.stringify(rules));

  // Add to history
  let history = JSON.parse(localStorage.getItem('ruleHistory')) || [];
  history.push({
    id: Date.now(),
    ruleName: ruleName,
    action: editId ? 'Updated' : 'Created',
    timestamp: new Date().toISOString()
  });
  localStorage.setItem('ruleHistory', JSON.stringify(history));

  window.history.back();
});
</script>

</body>
</html>
