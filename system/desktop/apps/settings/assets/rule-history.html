<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rule History</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --text: #ffffff;
    --text-muted: #8e8e93;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .container {
    max-width: 600px;
    position: relative;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }

  .history-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
  }

  .history-item:hover { background: rgba(255, 255, 255, 0.08); }

  .history-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .history-desc {
    font-size: 12px;
    color: var(--text-muted);
  }

  .history-time {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  
  .btn {
    background: rgba(255, 255, 255, 0.08);
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
    margin-top: 10px;
  }

  .btn:hover { background: rgba(255, 255, 255, 0.15); }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Rule History</h2>
    </div>

    <div id="historyContainer">
      <!-- History loaded here -->
    </div>
    
    <button class="btn" id="clearBtn" onclick="clearHistory()" style="display: none;">Clear History</button>
  </div>

<script>
const historyContainer = document.getElementById('historyContainer');
const clearBtn = document.getElementById('clearBtn');

function loadHistory() {
  let history = JSON.parse(localStorage.getItem('ruleHistory')) || [];
  historyContainer.innerHTML = '';

  if (history.length === 0) {
    historyContainer.innerHTML = '<div class="empty-state">No rule history available.</div>';
    clearBtn.style.display = 'none';
    return;
  }

  // Show newest first
  history.reverse().forEach(item => {
    const el = document.createElement('div');
    el.className = 'history-item';
    
    const date = new Date(item.timestamp);
    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const dateStr = date.toLocaleDateString();

    el.innerHTML = `
      <div>
        <div class="history-title">${item.ruleName}</div>
        <div class="history-desc">Action: ${item.action}</div>
      </div>
      <div class="history-time">
        <div>${timeStr}</div>
        <div>${dateStr}</div>
      </div>
    `;
    historyContainer.appendChild(el);
  });
  
  clearBtn.style.display = 'block';
}

function clearHistory() {
  if (confirm("Are you sure you want to clear the rule history?")) {
    localStorage.removeItem('ruleHistory');
    loadHistory();
  }
}

loadHistory();
</script>

</body>
</html>
