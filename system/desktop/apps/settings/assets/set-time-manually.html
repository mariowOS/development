<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Time Manually</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
  }
  
  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }
  
  .form-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  input[type="time"] {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
    color-scheme: dark; /* makes the clock icon dark mode */
  }

  input[type="time"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

  <div class="card">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Set Time Manually</h2>
    </div>

    <div class="form-group">
      <label for="timeInput">Select Time</label>
      <input type="time" id="timeInput">
    </div>
    
    <button class="btn" onclick="setTime()">Set System Time</button>
  </div>

<script>
window.addEventListener('load', function() {
  const timeInput = document.getElementById('timeInput');
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  timeInput.value = `${hours}:${minutes}`;
});

function setTime() {
  const timeInput = document.getElementById('timeInput');
  
  if (!timeInput.value) {
    alert('Please select a time');
    return;
  }

  const [hours, minutes] = timeInput.value.split(':');
  const h = parseInt(hours, 10);
  const m = parseInt(minutes, 10);

  const now = new Date();
  const offsetMs = (h - now.getHours()) * 3600000 + (m - now.getMinutes()) * 60000;
  
  localStorage.setItem('systemTimeOffset', offsetMs);
  localStorage.setItem('manualTimeEnabled', 'true');
  localStorage.removeItem('timezoneOffset');

  if (window.parent && window.parent.postMessage) {
    window.parent.postMessage({ type: 'time-updated' }, '*');
  }
  
  setTimeout(function() {
    window.history.back();
  }, 150);
}
</script>

</body>
</html>
