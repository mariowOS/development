<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Zone Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }
  
  .form-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
    appearance: none;
  }

  select:focus {
    outline: none;
    border-color: var(--accent);
  }

  select option {
    background: #1e1e1e;
    color: var(--text);
  }

  .preview-clock {
    font-size: 32px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

  <div class="card">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Time Zone</h2>
    </div>

    <div class="form-group">
      <label for="timezoneSelect">Select Region</label>
      <select id="timezoneSelect" onchange="updatePreviewClock()">
        <option value="-12">UTC−12 (International Date Line West)</option>
        <option value="-11">UTC−11 (Samoa Time)</option>      
        <option value="-10">UTC−10 (Hawaii Time)</option>
        <option value="-9">UTC−9 (Alaska Time)</option>
        <option value="-8">UTC−8 (Pacific Time)</option>
        <option value="-7">UTC−7 (Mountain Time)</option>
        <option value="-6">UTC−6 (Central Time)</option>
        <option value="-5">UTC−5 (Eastern Time)</option>
        <option value="-4">UTC−4 (Atlantic Time)</option>
        <option value="-3">UTC−3 (Buenos Aires Time)</option>
        <option value="-2">UTC−2 (Fernando de Noronha Time)</option>
        <option value="-1">UTC−1 (Azores Time)</option>
        <option value="0" selected>UTC±0 (Greenwich Mean Time)</option>
        <option value="1">UTC+1 (CET – Winter Time)</option>
        <option value="2">UTC+2 (EET / CEST – Summer Time)</option>
        <option value="3">UTC+3 (Eastern European Time)</option>
        <option value="4">UTC+4 (Gulf Standard Time)</option>
        <option value="5">UTC+5 (Pakistan Standard Time)</option>
        <option value="5.5">UTC+5:30 (India Standard Time)</option>
        <option value="6">UTC+6 (Bangladesh Standard Time)</option>
        <option value="7">UTC+7 (Indochina Time)</option>
        <option value="8">UTC+8 (China Standard Time)</option>
        <option value="9">UTC+9 (Japan Standard Time)</option>
        <option value="10">UTC+10 (Australian Eastern Time)</option>
        <option value="11">UTC+11 (Solomon Islands Time)</option>
        <option value="12">UTC+12 (New Zealand Standard Time)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Preview</label>
      <div id="previewClock" class="preview-clock">--:--</div>
    </div>
    
    <button class="btn" onclick="setTimeZone()">Apply Time Zone</button>
  </div>

<script>
window.addEventListener('load', function() {
  const saved = localStorage.getItem('timezoneOffset');
  if (saved !== null) {
    document.getElementById('timezoneSelect').value = saved;
  }
  updatePreviewClock();
  setInterval(updatePreviewClock, 1000);
});

function updatePreviewClock() {
  const select = document.getElementById('timezoneSelect');
  const offset = parseFloat(select.value);
  
  let now = new Date();
  let utcMs = now.getTime() - (now.getTimezoneOffset() * 60000);
  utcMs = utcMs + (offset * 3600000);
  
  let displayTime = new Date(utcMs);
  
  let h = displayTime.getUTCHours();
  let m = displayTime.getUTCMinutes();
  let s = displayTime.getUTCSeconds();
  
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  h = h ? h : 12;
  m = m < 10 ? "0"+m : m;
  s = s < 10 ? "0"+s : s;
  
  document.getElementById("previewClock").textContent = `${h}:${m}:${s} ${ampm}`;
}

function setTimeZone() {
  const select = document.getElementById('timezoneSelect');
  const offset = parseFloat(select.value);
  
  localStorage.setItem('timezoneOffset', offset);
  localStorage.setItem('systemTimeOffset', 0);
  localStorage.setItem('manualTimeEnabled', 'false');
  
  if (window.parent && window.parent.postMessage) {
    window.parent.postMessage({ type: 'time-updated' }, '*');
  }

  setTimeout(function() {
    window.history.back();
  }, 150);
}
</script>

</body>
</html>
