<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time & Date</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --text: #ffffff;
    --text-muted: #8e8e93;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .container {
    max-width: 600px;
    position: relative;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    border: none;
  }
  .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

  h2 { margin: 0; font-size: 18px; font-weight: 500; }

  .time-display {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: center;
  }

  .clock {
    font-size: 42px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .date {
    font-size: 14px;
    color: var(--text-muted);
  }

  .item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .item:hover { background: rgba(255, 255, 255, 0.08); }
  .item:active { transform: scale(0.98); }

  .text-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .text-desc {
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">‹</button>
      <h2>Time & Date</h2>
    </div>

    <div class="time-display">
      <div class="clock" id="clock">--:-- --</div>
      <div class="date" id="date">-</div>
    </div>

    <div class="item" onclick="window.location.href='set-time-manually.html'">
      <div>
        <div class="text-title">Set time manually</div>
        <div class="text-desc">Manually set the system time</div>
      </div>
      <div style="color: var(--text-muted);">›</div>
    </div>

    <div class="item" onclick="window.location.href='time-zone.html'">
      <div>
        <div class="text-title">Time zone</div>
        <div class="text-desc">Change your time zone</div>
      </div>
      <div style="color: var(--text-muted);">›</div>
    </div>
  </div>

<script>
function updateTime() {
  const manualEnabled = localStorage.getItem('manualTimeEnabled') === 'true';
  const sysOffset = parseInt(localStorage.getItem('systemTimeOffset')) || 0;
  const tzOffset = parseFloat(localStorage.getItem('timezoneOffset'));

  let now = new Date();
  
  if (manualEnabled) {
    now = new Date(now.getTime() + sysOffset);
  } else if (!isNaN(tzOffset)) {
    let utcMs = now.getTime() - (now.getTimezoneOffset() * 60000);
    now = new Date(utcMs + (tzOffset * 3600000));
  }

  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;
  
  document.getElementById('clock').textContent = `${hours}:${minutes} ${ampm}`;
  document.getElementById('date').textContent = now.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}

updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
