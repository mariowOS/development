<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
    --green: #34c759;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 14px 0;
  }

  p {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 16px 0;
    line-height: 1.5;
  }

  /* ── File Input ── */
  .file-input-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
    margin-bottom: 16px;
  }

  .file-input-wrapper input[type="file"] {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .file-input-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 24px;
    background: rgba(255,255,255,0.04);
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 12px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .file-input-label:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--accent);
  }

  .file-name {
    font-size: 13px;
    color: var(--accent);
    margin-top: 8px;
    text-align: center;
  }

  .btn {
    width: 100%;
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-sizing: border-box;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  
  #status {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-title">Custom Wallpaper</div>
    <p>Upload a custom PNG image to use as your desktop background.</p>
    
    <div class="file-input-wrapper">
      <input type="file" id="wallpaperFile" accept="image/png" onchange="updateFileName()">
      <div class="file-input-label">
        <span>📁 Click to choose a wallpaper (PNG)</span>
      </div>
      <div id="fileName" class="file-name"></div>
    </div>

    <button class="btn" onclick="uploadWallpaper()">Apply Wallpaper</button>
    <div id="status"></div>
  </div>

<script>
function updateFileName() {
  const file = document.getElementById("wallpaperFile").files[0];
  document.getElementById("fileName").textContent = file ? file.name : '';
}

async function uploadWallpaper() {
  const fileInput = document.getElementById("wallpaperFile");
  const statusDiv = document.getElementById("status");

  if (!fileInput.files.length) {
    statusDiv.textContent = "Please select a PNG file first.";
    statusDiv.style.color = "var(--red)";
    return;
  }

  const file = fileInput.files[0];
  if (file.type !== "image/png") {
    statusDiv.textContent = "Only PNG images are supported.";
    statusDiv.style.color = "var(--red)";
    return;
  }

  const formData = new FormData();
  formData.append("wallpaper", file);

  statusDiv.textContent = "Uploading...";
  statusDiv.style.color = "var(--text-muted)";
  document.querySelector('.btn').textContent = "Applying...";

  try {
    const response = await fetch("/upload-wallpaper", {
      method: "POST",
      body: formData
    });

    if (response.ok) {
      statusDiv.textContent = "Wallpaper updated successfully!";
      statusDiv.style.color = "var(--green)";
      
      // Notify parent to refresh wallpaper
      if (window.parent && typeof window.parent.applyUserWallpaper === 'function') {
        window.parent.applyUserWallpaper();
      } else {
        // Fallback postMessage approach
        window.parent.postMessage({ type: 'wallpaper-updated' }, '*');
      }

      setTimeout(() => {
        statusDiv.textContent = "";
      }, 3000);
    } else {
      statusDiv.textContent = "Failed to upload wallpaper.";
      statusDiv.style.color = "var(--red)";
    }
  } catch (err) {
    statusDiv.textContent = "Error: " + err.message;
    statusDiv.style.color = "var(--red)";
  } finally {
    document.querySelector('.btn').textContent = "Apply Wallpaper";
  }
}
</script>

</body>
</html>
