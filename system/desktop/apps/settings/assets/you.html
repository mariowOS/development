<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }
  
  .form-group:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  input[type="text"], input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  input::placeholder { color: #555; }

  .btn {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 10px;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  
  #statusMsg {
    margin-top: 12px;
    font-size: 13px;
    min-height: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" maxlength="30">
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" maxlength="50">
    </div>

    <button class="btn" onclick="saveSettings()">Save Profile</button>
    <div id="statusMsg"></div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const resp = await fetch('/get-settings');
    if (!resp.ok) return;

    const cfg = await resp.json();

    if (cfg.username) document.getElementById('username').value = cfg.username;
    if (cfg.email) document.getElementById('email').value = cfg.email;

    const isComplete = cfg.username?.trim() && cfg.email?.trim();
    if (isComplete) {
      window.location.replace('youafter.html');
    }
  } catch (err) {
    console.warn('Settings check failed:', err);
  }
});

function saveSettings() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const status = document.getElementById('statusMsg');

  if (!username || !email) {
    status.style.color = 'var(--red)';
    status.textContent = 'Username and Email cannot be empty.';
    return;
  }

  status.style.color = 'var(--text-muted)';
  status.textContent = 'Saving...';

  const settings = { username, email };

  fetch('/save-settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(settings)
  })
  .then(async response => {
    const ct = response.headers.get('content-type') || '';
    if (!ct.includes('application/json')) throw new Error('Server error: non-JSON response');

    const data = await response.json();
    if (data.success) {
      window.location.href = 'youcode.html';
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  })
  .catch(err => {
    status.style.color = 'var(--red)';
    status.textContent = 'Error saving settings: ' + err.message;
  });
}
</script>

</body>
</html>
