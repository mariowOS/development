<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Account</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
    --red-hover: #ff453a;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .account-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  
  .account-info:first-child { padding-top: 0; }

  .account-info .label {
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
  }

  .account-info .value {
    color: var(--text-muted);
    font-size: 13px;
  }

  .button-group {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
  }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }

  .btn-danger {
    background: rgba(255, 59, 48, 0.1);
    color: var(--red);
    border: 1px solid rgba(255, 59, 48, 0.2);
  }
  .btn-danger:hover { background: rgba(255, 59, 48, 0.2); }
</style>
</head>
<body>

  <div class="card">
    <div class="account-info">
      <span class="label">Username</span>
      <span class="value" id="u-username">—</span>
    </div>
    <div class="account-info" style="border-bottom: none; padding-bottom: 0;">
      <span class="label">Email Address</span>
      <span class="value" id="u-email">—</span>
    </div>

    <div class="button-group">
      <button class="btn btn-secondary" onclick="editSettings()">Edit Profile</button>
      <button class="btn btn-danger" onclick="clearSettings()">Reset Profile</button>
    </div>
  </div>

<script>
(async function(){
  try {
    const r = await fetch('/get-settings');
    if (!r.ok) throw new Error('Network');
    const cfg = await r.json();
    
    if (!cfg || (!cfg.username && !cfg.email)) {
      window.location.replace('you.html');
      return;
    }
    
    document.getElementById('u-username').textContent = cfg.username || '—';
    document.getElementById('u-email').textContent = cfg.email || '—';
  } catch (e) {
    console.warn('Failed to load settings:', e);
  }
})();

function editSettings() {
  window.location.href = 'you.html';
}

async function clearSettings() {
  if (!confirm('Are you sure you want to reset your profile settings?')) return;

  try {
    const r = await fetch('/clear-settings', { method: 'POST' });
    if (!r.ok) throw new Error('Network');
    const data = await r.json();
    if (data.success) {
      window.parent.postMessage({ type: 'settings-cleared' }, '*');
      window.location.replace('you.html');
    } else {
      alert('Error resetting settings: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    console.error('clearSettings failed', e);
    alert('Network error while resetting settings');
  }
}
</script>

</body>
</html>
