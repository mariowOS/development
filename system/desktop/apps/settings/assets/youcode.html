<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card-bg: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #3584e4;
    --accent-hover: #2a6dc4;
    --text: #ffffff;
    --text-muted: #8e8e93;
    --red: #ff3b30;
  }

  body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    margin: 0;
    padding: 10px 40px 40px 40px;
    background: transparent;
    overflow-y: auto;
  }
  
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  .card {
    max-width: 600px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }
  
  .form-group:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  input[type="text"], input[type="file"] {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  input::placeholder { color: #555; }

  /* ── File Input ── */
  .file-input-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
  }

  .file-input-wrapper input[type="file"] {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .file-input-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .file-input-label:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--accent);
  }

  .file-name {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .btn {
    width: 100%;
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 10px;
    box-sizing: border-box;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  
  .error {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="form-group">
      <label for="code">Verification Code</label>
      <input type="text" id="code" placeholder="Enter 6-digit code" maxlength="6">
      <div id="error" class="error"></div>
    </div>

    <div class="form-group" style="margin-top: 24px;">
      <label>Profile Avatar (Optional)</label>
      <div class="file-input-wrapper">
        <input type="file" id="avatar" accept="image/png,image/jpeg" onchange="updateFileName()">
        <div class="file-input-label">📁 Choose image file...</div>
      </div>
      <div id="fileName" class="file-name"></div>
    </div>

    <button class="btn" onclick="verifyCode()">Verify Code</button>
  </div>

<script>
function updateFileName() {
  const file = document.getElementById('avatar').files[0];
  document.getElementById('fileName').textContent = file ? '📎 ' + file.name : '';
}

async function verifyCode() {
  const code = document.getElementById('code').value.trim();
  const avatarFile = document.getElementById('avatar').files[0];
  const errorDiv = document.getElementById('error');

  if (!code || code.length !== 6) {
    errorDiv.textContent = 'Please enter a valid 6-digit code.';
    return;
  }

  errorDiv.textContent = '';
  document.querySelector('.btn').textContent = 'Verifying...';

  if (avatarFile) {
    const formData = new FormData();
    formData.append('avatar', avatarFile);

    try {
      const uploadResponse = await fetch('/upload-avatar', {
        method: 'POST',
        body: formData
      });

      if (!uploadResponse.ok) {
        throw new Error('Upload failed');
      }

      const uploadData = await uploadResponse.json();
      if (!uploadData.success) {
        throw new Error(uploadData.error || 'Upload error');
      }
    } catch (err) {
      errorDiv.textContent = 'Error uploading avatar: ' + err.message;
      document.querySelector('.btn').textContent = 'Verify Code';
      return;
    }
  }

  fetch('/verify-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code })
  })
  .then(async response => {
    const data = await response.json();
    if (data.success) {
      window.location.href = 'youafter.html';
    } else {
      errorDiv.textContent = data.error || 'Invalid code.';
      document.querySelector('.btn').textContent = 'Verify Code';
    }
  })
  .catch(err => {
    errorDiv.textContent = 'Error verifying code: ' + err.message;
    document.querySelector('.btn').textContent = 'Verify Code';
  });
}
</script>

</body>
</html>
