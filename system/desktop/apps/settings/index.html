<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1e1e1e;
      --sidebar-bg: rgba(24, 24, 24, 0.95);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.08);
      --accent: #3584e4;
      --accent-hover: #2a6dc4;
      --text: #ffffff;
      --text-muted: #8e8e93;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: var(--bg);
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      user-select: none;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 10px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    .sidebar-header {
      font-size: 20px;
      font-weight: 600;
      margin: 8px 0 18px 14px;
      letter-spacing: -0.3px;
    }

    .search {
      margin: 0 6px 16px 6px;
    }

    .search input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border 0.2s, background 0.2s;
    }

    .search input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.06);
    }

    .search input::placeholder {
      color: #666;
    }

    .menu-item {
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .menu-item.active {
      background: rgba(53, 132, 228, 0.15);
    }

    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .nav-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .menu-item.active .nav-title {
      color: var(--accent);
      font-weight: 600;
    }

    .nav-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main Content ── */
    .content {
      flex: 1;
      position: relative;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .content-header {
      padding: 32px 40px 10px 40px;
    }

    .content-header h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.3px;
    }

    .iframe-container {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .popup-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    .welcome-text {
      padding: 40px;
      font-size: 18px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="sidebar-header">Settings</div>
    <div class="search">
      <input type="text" placeholder="Search settings...">
    </div>

    <div class="menu">
      <div class="menu-item active" onclick="loadPage('you', this)">
        <div class="nav-icon">🗣</div>
        <div class="nav-text">
          <div class="nav-title">Profile</div>
          <div class="nav-subtitle">Manage your account</div>
        </div>
      </div>
      <div class="menu-item" onclick="loadPage('wallpaper', this)">
        <div class="nav-icon">⛶</div>
        <div class="nav-text">
          <div class="nav-title">Wallpaper & Style</div>
          <div class="nav-subtitle">Customize desktop</div>
        </div>
      </div>
      <div class="menu-item" onclick="loadPage('functions', this)">
        <div class="nav-icon">🧪</div>
        <div class="nav-text">
          <div class="nav-title">Functions Lab</div>
          <div class="nav-subtitle">Experimental features</div>
        </div>
      </div>
      <div class="menu-item" onclick="loadPage('system', this)">
        <div class="nav-icon">⚙︎</div>
        <div class="nav-text">
          <div class="nav-title">System</div>
          <div class="nav-subtitle">Preferences, reset</div>
        </div>
      </div>
      <div class="menu-item" onclick="loadPage('updater', this)">
        <div class="nav-icon">⟳</div>
        <div class="nav-text">
          <div class="nav-title">Updater</div>
          <div class="nav-subtitle">System updates</div>
        </div>
      </div>
      <div class="menu-item" onclick="loadPage('about', this)">
        <div class="nav-icon">🛈</div>
        <div class="nav-text">
          <div class="nav-title">About</div>
          <div class="nav-subtitle">System information</div>
        </div>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="welcome-text">what's cooking good looking?</div>
  </div>

  <script>
    const pages = {
      you: `
      <div class="content-header"><h2>Profile</h2></div>
      <div class="iframe-container"><iframe src="assets/you.html" class="popup-frame"></iframe></div>
    `,
      wallpaper: `
      <div class="content-header"><h2>Wallpaper & Style</h2></div>
      <div class="iframe-container"><iframe src="assets/wallpaper.html" class="popup-frame"></iframe></div>
    `,
      functions: `
      <div class="content-header"><h2>Functions Lab</h2></div>
      <div class="iframe-container"><iframe src="assets/lab.html" class="popup-frame"></iframe></div>
    `,
      system: `
      <div class="content-header"><h2>System</h2></div>
      <div class="iframe-container"><iframe src="assets/systemsettings.html" class="popup-frame"></iframe></div>
    `,
      updater: `
      <div class="content-header"><h2>Updater</h2></div>
      <div class="iframe-container"><iframe src="assets/update-mirror-2.html" class="popup-frame"></iframe></div>
    `,
      about: `
      <div class="content-header"><h2>About</h2></div>
      <div class="iframe-container"><iframe src="assets/about.html" class="popup-frame"></iframe></div>
    `
    };

    function loadPage(page, el) {
      document.getElementById("content").innerHTML = pages[page];

      document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));
      if (el) el.classList.add("active");
    }

    const searchInput = document.querySelector(".search input");
    const menuItems = document.querySelectorAll(".menu-item");

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase().trim();
      let firstMatch = null;

      menuItems.forEach(item => {
        const title = item.querySelector(".nav-title").textContent.toLowerCase();
        const subtitle = item.querySelector(".nav-subtitle").textContent.toLowerCase();

        if (!query || title.includes(query) || subtitle.includes(query)) {
          item.style.display = "flex";
          if (query && !firstMatch) firstMatch = item;
        } else {
          item.style.display = "none";
        }
      });

      if (firstMatch && query) {
        const page = firstMatch.getAttribute("onclick").match(/'([^']+)'/)[1];
        loadPage(page, firstMatch);
      }
    });

    // Automatically load the profile page on startup
    window.addEventListener('DOMContentLoaded', () => {
      const firstItem = document.querySelector('.menu-item.active');
      if (firstItem) {
        loadPage('you', firstItem);
      }
    });

  </script>
</body>

</html>
