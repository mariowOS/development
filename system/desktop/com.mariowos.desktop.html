<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0; padding:0; width:100%; height:100%; overflow:hidden;
      background: url("assets/wallpaper.factory.png") center/cover no-repeat fixed;
      background-color:#000; /* fallback */
      font-family:'Poppins',sans-serif; color:#fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* lilium engine-accelerated anims */
    /* GPU accelerated unlike older ones which relied on compositor only */
    @keyframes popupIn {
      from { opacity: 0; transform: scale3d(0.95, 0.95, 1); }
      to { opacity: 1; transform: scale3d(1, 1, 1); }
    }
    @keyframes popupOut {
      from { opacity: 1; transform: scale3d(1, 1, 1); }
      to { opacity: 0; transform: scale3d(0.95, 0.95, 1); }
    }

    /* Animazione di avvio fluida */
    @keyframes statusBarEntry {
      from {
        opacity: 0;
        transform: translate3d(0, -15px, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }
    
    /* Animazione specifica per il centro che preserva il translate3d di base */
    @keyframes statusBarCenterEntry {
      from {
        opacity: 0;
        transform: translate3d(-50%, -100%, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(-50%, -50%, 0);
      }
    }

    /* windowing system */
    .popup{
      display:none; position:fixed; top:20px; left:20px;
      width:1048px; height:600px; background:#1D1D1D; border:1px solid #2a2a2a;
      border-radius:10px; opacity:0; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,.5);
      z-index:50;
      will-change: transform, opacity;
      transform: translate3d(0,0,0);
    }
    .popup.active{ display:block; animation: popupIn .18s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .popup.closing{ animation: popupOut .15s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* windows title bar */
    .popup-header{
      height:32px; background:rgba(18, 18, 18, 0.29); display:flex; align-items:center; justify-content:space-between;
      padding:0 10px; cursor:move; border-bottom:1px solid #2a2a2a; font-size:13px; font-weight:500;
      user-select:none; -webkit-user-select:none;
    }
    .popup-header .altf4{cursor:pointer; transition:color .2s ease}
    .popup-header .altf4:hover{color:#ff453a}

    .popup-frame{ width:100%; height:calc(100% - 32px); border:none; }
    .popup-content{ padding:15px; height:calc(100% - 32px); overflow-y:auto; text-align:center; box-sizing: border-box; }

    /* status bar */
    .status-bar{
      position:absolute; top:0; left:0; width:100vw; height:56px;
      display:flex; align-items:center; justify-content:space-between;
      z-index:100; padding:0 32px; box-sizing:border-box; background:transparent;
    }
    .status-left,.status-right{display:flex;align-items:center;gap:12px}
    
    /* Applichiamo lo staggered effect in modo pulito mantenendo inline-block e flex */
    .status-left .btn-wrapper:nth-child(1) {
      animation: statusBarEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    .status-left > .status-btn {
      animation: statusBarEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.18s both;
    }
    .status-left .btn-wrapper:nth-child(3) {
      animation: statusBarEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.26s both;
    }
    
    .status-center {
      position: absolute; left: 50%; top: 50%; color: #fff; font-weight: 600; font-size: 14px; letter-spacing: .5px;
      background: rgba(26, 26, 26, 0.624); padding: 6px 20px; border-radius: 100px; min-width: 260px; text-align: center; pointer-events: none;
      /* Animazione dedicata al centro per evitare conflitti con left 50% */
      animation: statusBarCenterEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.32s both;
    }
    
    .status-right .btn-wrapper {
      animation: statusBarEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .status-btn{
      background:rgba(26, 26, 26, 0.624); color:#fff; border:none; border-radius:100px; padding:6px 20px;
      font-size:13px; font-weight:500; cursor:pointer; outline:none; display:flex; align-items:center; gap:8px; transition:background .2s ease;
      font-family:'Poppins';
    }
    .status-btn:hover{background:rgba(26, 26, 26, 0.813)}
    .notification{
      width:28px; height:28px; background:rgba(26, 26, 26, 0.624); border:none; border-radius:100px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; margin-right:4px;
    }
    .notification svg{ width:22px; height:22px; fill:#fff; opacity:.85 }

    /* dropdowns (i drop down harder when i see her eyes) */
    .btn-wrapper{ position:relative; display:inline-block; }
    .dropdown{
      position:absolute; top:calc(100% + 6px); left:0; background:rgba(26, 26, 26, 0.444); border-radius:12px;
      min-width:200px; max-height:220px; overflow-y:auto; box-shadow:0 8px 18px rgba(0,0,0,.25);
      opacity:0; transform: translate3d(0, -10px, 0) scale3d(.95, .95, 1); pointer-events:none; 
      transition: transform .2s cubic-bezier(0.16, 1, 0.3, 1), opacity .2s ease; z-index:200; transform-origin:top center;
      will-change: transform, opacity;
    }
    .dropdown.open{ opacity:1; transform: translate3d(0, 0, 0) scale3d(1, 1, 1); pointer-events:auto; }
    .dropdown.activities{ max-height:none; overflow-y:visible; }
    .dropdown-item{ padding:10px 16px; font-size:14px; color:#fff; cursor:pointer; transition:background .15s ease; white-space:nowrap; }
    .dropdown-item:hover{ background:rgba(255, 255, 255, 0.049); }

    #notificationsDropdown { right: 0; left: auto; max-width: 300px; white-space: normal; word-break: break-word; }
    .menu-icon { width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; }

    ::-webkit-scrollbar{ background:rgba(255, 255, 255, 0.03); width: 8px; }
    ::-webkit-scrollbar-thumb{ background-color:rgba(255,255,255,.2); border-radius:50px; }
    a { text-decoration: none; color: #ffffff; }

    /* browser URL bar */
    #browserUrl {
      flex: 1; background: rgba(255,255,255,.07); border: 1px solid #3a3a3a;
      border-radius: 7px; color: #fff; font-size: 12px; padding: 4px 10px; outline: none;
      font-family: 'Poppins', sans-serif; transition: border-color .2s ease;
    }
    #browserUrl:focus { border-color: #666; }
    .browser-nav-btn {
      background: rgba(255,255,255,.08); border: none; color: #aaa; border-radius: 5px;
      width: 24px; height: 24px; cursor: pointer; font-size: 14px; line-height: 1;
      transition: background .2s, color .2s; flex-shrink: 0;
    }
    .browser-nav-btn:hover { background: rgba(255,255,255,.18); color: #fff; }
  </style>
</head>

  <script>
    let popupCounter = 0;
    const statusBar = document.querySelector('.status-bar');
    const STATUSBAR_H = 56;
    const RESERVED_TOP = STATUSBAR_H + 12;

    function openPopup(popupId){
      const popup = document.getElementById(popupId);
      popup.classList.remove("closing");

      const cs = getComputedStyle(popup);
      const popupWidth = parseInt(cs.width, 10) || 1048;
      const popupHeight = parseInt(cs.height, 10) || 600;
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      let perRow = Math.floor((screenWidth - 40) / (popupWidth + 20)) || 1;
      let row = Math.floor(popupCounter / perRow);
      let col = popupCounter % perRow;

      let left = col * (popupWidth + 20) + 20;
      let top  = RESERVED_TOP + row * (popupHeight + 20);

      left = Math.max(8, Math.min(left, screenWidth - popupWidth - 8));
      top  = Math.max(RESERVED_TOP, Math.min(top, screenHeight - popupHeight - 8));

      popup.style.left = left + "px";
      popup.style.top  = top  + "px";

      focusPopup(popup);
      popup.style.display = "block";
      popup.classList.add("active");
      popupCounter++;

      const header = popup.querySelector(".popup-header");
      if (header && !header.dataset.dragSetup) {
        makeDraggable(popup, header, RESERVED_TOP);
        header.dataset.dragSetup = "true";
      }
    }

    function closePopup(popupId){
      const popup = document.getElementById(popupId);
      popup.classList.remove("active");
      popup.classList.add("closing");
      
      const onAnimationEnd = () => {
        popup.style.display = "none";
        popup.classList.remove("closing");
        popup.removeEventListener("animationend", onAnimationEnd);
      };
      popup.addEventListener("animationend", onAnimationEnd);
    }

    function getHighestZIndex(elems){
      let hi = 50;
      for (let i = 0; i < elems.length; i++){
        const z = parseInt(elems[i].style.zIndex, 10) || 0;
        if (z > hi) hi = z;
      }
      return hi;
    }

    function focusPopup(popup){
      const activePopups = document.getElementsByClassName("popup");
      popup.style.zIndex = getHighestZIndex(activePopups) + 1;
    }

    function makeDraggable(el, handle, minTop){
      let pos1=0, pos2=0, pos3=0, pos4=0;
      handle.onmousedown = dragMouseDown;
      handle.ontouchstart = (e) => dragMouseDown(e.touches[0]);

      function dragMouseDown(e){
        focusPopup(el);
        pos3 = e.clientX; pos4 = e.clientY;
        document.onmouseup = closeDrag;
        document.onmousemove = drag;
        document.ontouchend = closeDrag;
        document.ontouchmove = (ev) => drag(ev.touches[0]);
      }

      function drag(e){
        pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
        pos3 = e.clientX; pos4 = e.clientY;

        let newTop  = el.offsetTop - pos2;
        let newLeft = el.offsetLeft - pos1;

        const maxLeft = window.innerWidth - el.offsetWidth - 8;
        const maxTop  = window.innerHeight - el.offsetHeight - 8;

        newLeft = Math.max(8, Math.min(newLeft, maxLeft));
        newTop  = Math.max(minTop, Math.min(newTop, maxTop));

        el.style.top  = newTop + "px";
        el.style.left = newLeft + "px";
      }

      function closeDrag(){
        document.onmouseup = null; document.onmousemove = null;
        document.ontouchend = null; document.ontouchmove = null;
      }
    }

    document.addEventListener('mousedown', (e)=>{
      const header = e.target.closest('.popup-header');
      if (header) focusPopup(header.parentElement);
    });

    // Browser Actions
    function openAdvancedSearch(query) {
      query = query.trim();
      if (!query) return;
      if (/^https?:\/\//i.test(query) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(query)) {
        const url = query.startsWith('http') ? query : 'https://' + query;
        document.getElementById('browserFrame').src = url;
        document.getElementById('browserUrl').value = url;
      } else {
        document.getElementById('advSearchQuery').value = query;
        openPopup('popupAdvancedSearch');
      }
    }

    function performAdvancedSearch(event) {
      event.preventDefault();
      const query = document.getElementById('advSearchQuery').value.trim();
      if (!query) return;
      
      const searchType = document.querySelector('input[name="searchType"]:checked').value;
      const safeSearch = document.getElementById('safeSearch').checked;
      const encodedQuery = encodeURIComponent(query);
      
      const searchTypeMap = {
        'web': `https://www.google.com/search?q=${encodedQuery}`,
        'images': `https://www.google.com/search?q=${encodedQuery}&tbm=isch`,
        'news': `https://www.google.com/search?q=${encodedQuery}&tbm=nws`,
        'videos': `https://www.google.com/search?q=${encodedQuery}&tbm=vid`,
        'books': `https://www.google.com/search?q=${encodedQuery}&tbm=bks`,
        'shopping': `https://www.google.com/search?q=${encodedQuery}&tbm=shop`
      };
      
      let googleUrl = searchTypeMap[searchType] || searchTypeMap['web'];
      if (safeSearch) googleUrl += '&safe=active';
      
      document.getElementById('browserFrame').src = googleUrl;
      document.getElementById('browserUrl').value = googleUrl;
      closePopup('popupAdvancedSearch');
    }

    function browserNav(action) {
      const f = document.getElementById('browserFrame');
      try {
        if (action === 'back')   f.contentWindow.history.back();
        if (action === 'fwd')    f.contentWindow.history.forward();
        if (action === 'reload') f.contentWindow.location.reload();
      } catch(e) {
        if (action === 'reload') f.src = f.src;
      }
    }

    // Passive Clock & Offset Updates
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    let systemTimeOffset = 0, timezoneOffset = 0, manualTimeEnabled = false;

    function updateClock(){
      const now = new Date();
      let utcMs = now.getTime() - (now.getTimezoneOffset() * 60000);
      if (timezoneOffset !== null) {
        utcMs += timezoneOffset * 3600000;
      } else if (manualTimeEnabled) {
        utcMs += systemTimeOffset;
      }
      const d = new Date(utcMs);
      let h = d.getUTCHours(), m = d.getUTCMinutes();
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      m = m < 10 ? "0" + m : m;
      document.getElementById("center-clock").textContent = `${days[d.getUTCDay()]} ${d.getUTCDate()} ${months[d.getUTCMonth()]}, ${h}:${m} ${ampm}`;
    }

    function checkTimeOffset(){
      timezoneOffset = localStorage.getItem('timezoneOffset') !== null ? parseFloat(localStorage.getItem('timezoneOffset')) : null;
      systemTimeOffset = localStorage.getItem('systemTimeOffset') !== null ? parseInt(localStorage.getItem('systemTimeOffset'), 10) : 0;
      manualTimeEnabled = localStorage.getItem('manualTimeEnabled') === 'true';
    }

    setInterval(() => { checkTimeOffset(); updateClock(); }, 1000);
    checkTimeOffset(); updateClock();

// Dropdown Logic
function setupDropdown(btnId, ddId){
  const btn = document.getElementById(btnId);
  const dd  = document.getElementById(ddId);
  
  btn.addEventListener('click', (e)=> { 
    e.stopPropagation(); 
    
    const isOpen = dd.classList.contains('open');
    
    document.querySelectorAll('.dropdown.open').forEach(openDd => {
      openDd.classList.remove('open');
    });
    
    if (!isOpen) {
      dd.classList.add('add'); // Mantenuto coerente con la logica originale
      dd.classList.add('open');
    }
  });
}

setupDropdown("actionsBtn","actionsDropdown");
setupDropdown("activitiesBtn","activitiesDropdown");
setupDropdown("notificationsBtn","notificationsDropdown");

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown.open').forEach(dd => dd.classList.remove('open'));
});

    // Wallpapers
    function applyUserWallpaper() {
      fetch("/desktop/assets/wallpaper.user.png", { method: "HEAD" })
        .then(res => {
          document.body.style.backgroundImage = res.ok 
            ? 'url("/desktop/assets/wallpaper.user.png?ts=' + Date.now() + '")'
            : 'url("/desktop/assets/wallpaper.png")';
        }).catch(() => {
          document.body.style.backgroundImage = 'url("assets/wallpaper.factory.png")';
        });
    }
    window.addEventListener("DOMContentLoaded", applyUserWallpaper);

    // Cross-Window Messages
    window.addEventListener("message", async (e) => {
      if (e.data.type === "load-youafter") {
        document.getElementById("popup1").querySelector("iframe").src = "apps/settings/assets/youafter.html";
      }
      if (e.data.type === 'clear-settings') {
        try {
          const res = await fetch('/config.json');
          const cfg = await res.json();
          await fetch('/clear-settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passwordHash: cfg.passwordHash })
          });
          e.source.postMessage({ type: 'settings-cleared' }, '*');
        } catch (err) {
          e.source.postMessage({ type: 'settings-cleared', error: err.message }, '*');
        }
      }
      if (e.data.type === 'get-settings') {
        try {
          const res = await fetch('/get-settings');
          const cfg = await res.json();
          e.source.postMessage({ type: 'settings', data: cfg }, '*');
        } catch (err) {}
      }
    });
  </script>
