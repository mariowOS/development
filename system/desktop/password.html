<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>mariowOS - User Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        /* --- Animazione Testi --- */
        .text-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        h1 { font-size: 5.5rem; font-weight: 800; letter-spacing: -2px; line-height: 0.9; }
        .gray-text { font-size: 3.8rem; font-weight: 700; color: #333; letter-spacing: -1.5px; line-height: 0.9; }

        .letter {
            display: inline-block;
            opacity: 0;
            filter: blur(15px);
            transform: translateX(-30px);
            animation: letterIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes letterIn {
            to { opacity: 1; filter: blur(0px); transform: translateX(0); }
        }

        /* --- Card Bianca (User/Password) --- */
        .user-card {
            background-color: #ffffff;
            color: #000;
            padding: 50px;
            border-radius: 40px;
            width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: cardIn 1.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.8s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        @keyframes cardIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }

        .user-icon {
            width: 80px;
            height: 80px;
            background-color: #0033ff; /* Blu Samsung */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .user-icon svg { width: 45px; height: 45px; fill: white; }

        /* Form Styling */
        .input-wrapper { width: 100%; margin-bottom: 20px; }
        .input-label { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; display: block; color: #000; }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background-color: #e0e0e0;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            transition: background-color 0.2s;
        }

        input:focus { background-color: #d0d0d0; }

        #nextBtn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #333;
            color: #666;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: not-allowed;
            border: none;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            animation-delay: 1.8s;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #nextBtn.enabled {
            background: white;
            color: black;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        #nextBtn.enabled:hover { transform: scale(1.1); }
        #nextBtn svg { width: 35px; height: 35px; fill: currentColor; }
        
        @keyframes fadeIn { to { opacity: 1; } }

        .hidden { display: none; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .container { flex-direction: column; align-items: flex-start; gap: 30px; overflow-y: auto; }
            h1 { font-size: 3.5rem; }
            .gray-text { font-size: 2.2rem; }
            .user-card { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="text-group">
            <h1 class="split-text" data-delay="0">User</h1>
            <div class="gray-text split-text" data-delay="0.2">Utente</div>
            <div class="gray-text split-text" data-delay="0.4">Utilizador</div>
            <div class="gray-text split-text" data-delay="0.6">用户</div>
        </div>

        <div class="user-card">
            <div class="user-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            
            <form id="passwordForm" style="width: 100%;">
                <div class="input-wrapper">
                    <label class="input-label">Username</label>
                    <input type="text" id="usernameInput" placeholder="Inserisci username" required>
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Enter password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Repeat password</label>
                    <input type="password" id="confirmInput" placeholder="••••••••" required>
                </div>
            </form>
        </div>
    </div>

    <button id="nextBtn" type="button">
        <svg id="arrow-icon" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        <svg id="spinner" class="hidden animate-spin" viewBox="0 0 24 24" style="fill:none; stroke:currentColor; stroke-width:3;">
            <circle cx="12" cy="12" r="10" style="opacity:0.25;"></circle>
            <path d="M4 12a8 8 0 018-8" style="opacity:0.75;"></path>
        </svg>
    </button>

    <script>
        document.querySelectorAll('.split-text').forEach(element => {
            const text = element.innerText;
            const baseDelay = parseFloat(element.getAttribute('data-delay'));
            element.innerHTML = ''; 
            [...text].forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char === " " ? "\u00A0" : char; 
                span.classList.add('letter');
                span.style.animationDelay = `${baseDelay + (index * 0.04)}s`;
                element.appendChild(span);
            });
        });
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const confirmInput = document.getElementById("confirmInput");
        const nextBtn = document.getElementById("nextBtn");
        const arrowIcon = document.getElementById("arrow-icon");
        const spinner = document.getElementById("spinner");

        function updateButtonState() {
            if (usernameInput.value.trim().length > 0 && 
                passwordInput.value.length > 0 && 
                confirmInput.value.length > 0) {
                nextBtn.classList.add("enabled");
            } else {
                nextBtn.classList.remove("enabled");
            }
        }

        [usernameInput, passwordInput, confirmInput].forEach(input => {
            input.addEventListener("input", updateButtonState);
        });

        nextBtn.addEventListener("click", async () => {
            if (!nextBtn.classList.contains("enabled")) return;

            const pass = passwordInput.value;
            const confirm = confirmInput.value;

            if (pass !== confirm) {
                alert("Le password non corrispondono!");
                return;
            }

            nextBtn.classList.remove("enabled");
            arrowIcon.classList.add("hidden");
            spinner.classList.remove("hidden");

            try {
                const res = await fetch("/set-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ 
                        username: usernameInput.value, 
                        newPassword: pass 
                    })
                });

                const text = await res.text();
                if (text.includes("✅")) {
                    window.location.href = "/desktop/preferences.html";
                } else {
                    alert(text);
                }
            } catch (err) {
                alert("Errore di connessione: " + err.message);
            } finally {
                spinner.classList.add("hidden");
                arrowIcon.classList.remove("hidden");
                updateButtonState();
            }
        });
    </script>
</body>
</html>
