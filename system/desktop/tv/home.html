<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaccia TV OS - Fix Clipping & Focus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --accent-color: #ffffff;
            --focus-ring: #ffffff;
            --transition-speed: 0.3s;
            --easing: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            height: 100vh; 
        }

        .tv-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop');
            background-size: cover;
            background-position: center 20%;
            z-index: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .hero-background-next {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 20%;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .vignette-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(11, 14, 20, 0.95) 0%, rgba(11, 14, 20, 0.6) 30%, transparent 70%),
                        linear-gradient(to top, rgba(11, 14, 20, 1) 5%, rgba(11, 14, 20, 0.8) 25%, transparent 65%);
            z-index: 1;
        }

        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            animation: slideDown 1s var(--easing) backwards;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            box-shadow: 0 0 0 2px transparent;
            transition: transform var(--transition-speed) var(--easing), box-shadow var(--transition-speed);
        }

        .profile-pic:focus, .profile-pic:hover {
            transform: scale(1.1);
            box-shadow: 0 0 0 3px var(--accent-color);
            outline: none;
        }

        nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition-speed) var(--easing);
        }

        .nav-btn:hover, .nav-btn:focus {
            color: var(--text-primary);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-btn.active {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-speed) var(--easing);
        }
        
        .icon-btn svg {
            display: block;
        }

        .icon-btn:hover, .icon-btn:focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            outline: none;
        }

        .os-logo-placeholder {
            margin-left: 10px;
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        main {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 60px;
            justify-content: flex-end;
            padding-bottom: 30px;
        }

        .hero-content {
            max-width: 55%;
            margin-bottom: 35px;
            animation: slideUpFade 1s var(--easing) backwards;
            animation-delay: 0.2s;
        }

        .provider-logo {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        .hero-title {
            font-size: 4.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.1;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .hero-desc-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hero-desc {
            font-size: 1.05rem;
            font-weight: 300;
            color: #e0e0e0;
            line-height: 1.5;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background-color: white;
            width: 8px;
            height: 8px;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        .row-section {
            margin-bottom: 25px;
            animation: slideUpFade 1s var(--easing) backwards;
        }

        .row-section:nth-of-type(1) { animation-delay: 0.4s; }
        .row-section:nth-of-type(2) { animation-delay: 0.5s; }

        .row-title {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: #dcdcdc;
            letter-spacing: 0.3px;
        }

        .carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            /* FIX: Padding laterale aggiunto per evitare che l'outline venga tagliato */
            padding: 15px 12px; 
            /* FIX: Margin negativo per compensare il padding e mantenere l'allineamento */
            margin: -15px -12px; 
            scrollbar-width: none; 
        }
        .carousel::-webkit-scrollbar {
            display: none;
        }

        .carousel > div {
            animation: slideRightFade 0.8s var(--easing) backwards;
        }
        .carousel > div:nth-child(1) { animation-delay: 0.5s; }
        .carousel > div:nth-child(2) { animation-delay: 0.6s; }
        .carousel > div:nth-child(3) { animation-delay: 0.7s; }
        .carousel > div:nth-child(4) { animation-delay: 0.8s; }
        .carousel > div:nth-child(5) { animation-delay: 0.9s; }
        .carousel > div:nth-child(6) { animation-delay: 1.0s; }
        .carousel > div:nth-child(7) { animation-delay: 1.1s; }

        .poster-card {
            width: 250px;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            background-color: #222;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 2px solid transparent;
            transition: transform var(--transition-speed) var(--easing), 
                        border-color var(--transition-speed),
                        box-shadow var(--transition-speed);
            flex-shrink: 0;
        }

        .poster-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .poster-card:hover, .poster-card:focus {
            transform: scale(1.05);
            border-color: var(--focus-ring);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            outline: none;
            z-index: 5;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform var(--transition-speed) var(--easing), 
                        box-shadow var(--transition-speed);
        }

        .app-icon:hover, .app-icon:focus {
            transform: scale(1.15);
            box-shadow: 0 0 0 4px var(--focus-ring), 0 10px 20px rgba(0,0,0,0.6);
            outline: none;
            z-index: 5;
        }

        /* KEYFRAMES */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideRightFade {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="tv-container">
    <div class="hero-background" id="bg-current"></div>
    <div class="hero-background-next" id="bg-next"></div>
    <div class="vignette-overlay"></div>

    <header>
        <div class="header-left">
            <img src="https://placehold.co/100x100/333/FFF?text=M" alt="User" class="profile-pic" tabindex="0">
            
            <nav id="main-nav">
                <button class="nav-btn active" tabindex="0" onclick="switchTab(this, 'foryou')">For you</button>
                <button class="nav-btn" tabindex="0" onclick="switchTab(this, 'movies')">Movies</button>
                <button class="nav-btn" tabindex="0" onclick="switchTab(this, 'shows')">Shows</button>
                <button class="nav-btn" tabindex="0" onclick="switchTab(this, 'apps')">Apps</button>
                <button class="nav-btn" tabindex="0" onclick="switchTab(this, 'library')">Library</button>
            </nav>
        </div>

        <div class="header-right">
            <button class="icon-btn" tabindex="0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
            <button class="icon-btn" tabindex="0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div class="os-logo-placeholder"><img src="assets/logotv.png" width="180" height="35"></div>
        </div>
    </header>

    <main id="main-content">
        <section class="hero-content">
            <div class="provider-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                YouTube
            </div>
            <h1 class="hero-title">Despicable Me 4</h1>
            <div class="hero-desc-container">
                <p class="hero-desc">Trending | Criminal mastermind Maxime Le Mal escapes from prison and vows revenge against Gru</p>
            </div>
        </section>

        <section class="row-section">
            <h2 class="row-title">Top picks for you</h2>
            <div class="carousel">
                <div class="poster-card" tabindex="0"><img src="https://placehold.co/400x225/111/FFF?text=Oppenheimer" alt="Oppenheimer"></div>
                <div class="poster-card" tabindex="0"><img src="https://placehold.co/400x225/002B5C/FFF?text=X-Men+97" alt="X-Men"></div>
                <div class="poster-card" tabindex="0"><img src="https://placehold.co/400x225/2E4C4B/FFF?text=Summer+Turned+Pretty" alt="Summer"></div>
                <div class="poster-card" tabindex="0"><img src="https://placehold.co/400x225/4A3F35/FFF?text=Masters+of+the+Air" alt="Masters"></div>
                <div class="poster-card" tabindex="0"><img src="https://placehold.co/400x225/1A1A1A/FFF?text=The+Equalizer+3" alt="Equalizer"></div>
            </div>
        </section>

        <section class="row-section">
            <h2 class="row-title">Your apps</h2>
            <div class="carousel">
                <div class="app-icon" tabindex="0" style="background:#E50914;">NETFLIX</div>
                <div class="app-icon" tabindex="0" style="background:white; color:red; font-size: 1.8rem;">▶</div>
                <div class="app-icon" tabindex="0" style="background:#00A8E1;">Prime</div>
                <div class="app-icon" tabindex="0" style="background:#001E62;">Disney+</div>
                <div class="app-icon" tabindex="0" style="background:#000;">Apple TV</div>
                <div class="app-icon" tabindex="0" style="background:#FF0000; font-size:1.8rem;">▶</div> 
                <div class="app-icon" tabindex="0" style="background:#002BE7;">max</div>
            </div>
        </section>
    </main>
</div>

<script>
    function switchTab(clickedElement, pageName) {
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(btn => btn.classList.remove('active'));

        clickedElement.classList.add('active');

        const bgCurrent = document.getElementById('bg-current');
        const bgNext = document.getElementById('bg-next');
        
        let newImgUrl = "url('assets/despicableme4.jpg')";

        if(pageName === 'movies') {
            newImgUrl = "url('assets/despicableme4.jpg')";
        } else if (pageName === 'shows') {
            newImgUrl = "url('assets/despicableme4.jpg')";
        }

        bgNext.style.backgroundImage = newImgUrl;
        bgNext.style.opacity = '1';

        setTimeout(() => {
            bgCurrent.style.backgroundImage = newImgUrl;
            bgNext.style.opacity = '0';
        }, 800);
    }

    document.addEventListener('keydown', function(e) {
        if(e.key === 'Enter') {
            if(document.activeElement) {
                document.activeElement.click();
            }
        }
    });
</script>

</body>
</html>
