<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html,body {
  height:100%; margin:0;
  font-family:'Poppins',sans-serif;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

body {
  background:url("/desktop/assets/wallpaper.png") center/cover no-repeat fixed;
  background-color:#000; /* fallback */
  display:flex; align-items:center; justify-content:center;
  color:#fff; overflow:hidden;
  transform: translateZ(0); /* force GPU on body */
}

@keyframes loginRiseUp {
  from {
    opacity: 0;
    /* Manteniamo il -50% per centrare sull'asse X e partiamo più in basso di 40px */
    transform: translate3d(-50%, 40px, 0);
  }
  to {
    opacity: 1;
    /* Manteniamo il -50% e torniamo alla posizione Y originale (0) */
    transform: translate3d(-50%, 0, 0);
  }
}

@keyframes datetimeRiseUp {
  from {
    opacity: 0;
    transform: translate3d(0, 160px, 0);
  }
  to {
    opacity: 1;
    transform: translate3d(0, 120px, 0);
  }
}

/* --- ANIMAZIONE DI USCITA (FALL DOWN EFFECT) --- */
@keyframes fallDownExit {
  from {
    opacity: 1;
    /* Preserviamo il centraggio X anche all'inizio della caduta */
    transform: translate3d(-50%, 0, 0);
  }
  to {
    opacity: 0;
    /* Preserviamo il centraggio X e spingiamo giù su Y */
    transform: translate3d(-50%, 400px, 0);
  }
}

@keyframes datetimeFallDownExit {
  from {
    opacity: 1;
    transform: translate3d(0, 120px, 0);
  }
  to {
    opacity: 0;
    transform: translate3d(0, 500px, 0);
  }
}

.datetime {
  position:absolute;
  top: 0;
  left: 0;
  width:100%;
  text-align:center;
  pointer-events:none;
  /* Animazione ingresso fluida */
  transform: translate3d(0, 120px, 0); 
  animation: datetimeRiseUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  will-change: transform, opacity;
}

/* Classe aggiunta via JS al momento dello sblocco */
.datetime.unlock-falling {
  animation: datetimeFallDownExit 0.55s cubic-bezier(0.32, 0, 0.67, 0) forwards !important;
}

.datetime .date {
  font-size:22px;
  color:rgba(255,255,255,0.94);
  margin-bottom:6px;
  text-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.datetime .time {
  font-size:120px;
  font-weight:600;
  line-height:0.9;
  color:rgba(255,255,255,0.98);
  text-shadow:0 8px 30px rgba(0,0,0,0.45);
}

.center-stack {
  position: absolute;
  bottom: 160px;
  left: 50%;
  transform: translate3d(-50%, 0, 0);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  /* Animazione ingresso ritardata rispetto a date/time */
  animation: loginRiseUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  will-change: transform, opacity;
}

/* Classe aggiunta via JS al momento dello sblocco */
.center-stack.unlock-falling {
  animation: fallDownExit 0.5s cubic-bezier(0.32, 0, 0.67, 0) forwards !important;
}

.avatar {
  width:58px;
  height:58px;
  border-radius:50%;
  background:url("/desktop/assets/avatar.png") center/cover no-repeat;
  box-shadow:0 6px 18px rgba(0,0,0,0.55), inset 0 -4px 10px rgba(0,0,0,0.12);
  transition: background-image 0.3s ease;
  transform: translateZ(0);
}

.unlock-pill {
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius:999px;
  width:340px;
  height:48px;
  overflow:hidden;
  border:2px solid transparent;
  transition: border-color 0.3s ease;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
  transform: translateZ(0); /* blur on GPU */
  will-change: transform, border-color;
}

.unlock-pill input {
  flex:1;
  height:100%;
  padding:0 20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border:none;
  outline:none;
  color:white;
  font-size:18px;
  font-family: 'Poppins';
}

#forgotPassword {
  flex:1;
  height:100%;
  padding:0 20px;
  text-decoration: none;
  border:none;
  outline:none;
  color: #ffffff;
  font-size:18px;
  font-family: 'Poppins';
}

.unlock-pill button {
  width:56px;
  height:100%;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 0.15s ease, background 0.3s ease, box-shadow 0.3s ease;
  border-top-right-radius:999px;
  border-bottom-right-radius:999px;
  position:relative;
  z-index:2;
  will-change: transform;
}

.unlock-pill button:hover {
  transform: scale3d(1.04, 1.04, 1);
}

.unlock-pill button:active {
  transform: scale3d(0.95, 0.95, 1);
  box-shadow:inset 0 1px 1px rgba(0,0,0,0.2);
}

.unlock-pill.wrong {
  border-color: rgba(255, 59, 48, 1);
  animation: shake 0.45s cubic-bezier(.36, .07, .19, .97) both, fadeBorder 1s forwards;
}

#loginBtn:hover{
  background-color:#c0c0c0;
}

@keyframes shake {
  10%, 90% { transform: translate3d(-4px, 0, 0); }
  20%, 80% { transform: translate3d(6px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
  40%, 60% { transform: translate3d(8px, 0, 0); }
}

@keyframes fadeBorder {
  0% { border-color:rgba(255,59,48,1); }
  100% { border-color:transparent; }
}

@media (max-width:520px) {
  .datetime .time { font-size:72px; }
  .unlock-pill { width:calc(100% - 40px); height:44px; }
  .avatar { width:52px; height:52px; }
}

#loginBtn {
  background-color:#d9d9d9;
}

.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transform: translateZ(0);
}
.popup {
  background: rgba(255, 255, 255, 0.9);
  border-radius: 16px;
  padding: 30px 40px;
  text-align: center;
  max-width: 400px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.popup h1 {
  margin-top: 0;
  font-weight: 600;
  font-size: 26px;
  color: #000000;
}
.popup p {
  color: rgba(0, 0, 0, 0.85);
  font-size: 15px;
  margin: 12px 0 24px;
}
.popup-buttons {
  display: flex;
  justify-content: center;
  gap: 14px;
}
.popup-buttons button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: 'Poppins';
  font-weight: 500;
  transition: transform 0.2s ease, background 0.2s ease;
  will-change: transform;
}
.popup-buttons button:hover { transform: scale3d(1.04, 1.04, 1); }
#closePopup { background: #bdbdbd; color: #fff; }
#redirectPopup { background: #002fff; color: #ffffff; }
</style>
</head>
<body>
  <div class="datetime" id="datetimeBlock" aria-hidden="true">
    <div class="date" id="date">Loading…</div>
    <div class="time" id="time">00:00</div>
  </div>

  <div class="center-stack" id="centerStackBlock" role="main">
    <div class="avatar" aria-hidden="true"></div>
    <div class="unlock-pill" id="unlockPill" aria-label="Unlock">
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter password" aria-label="Password" class="w-full">
      <button id="loginBtn" title="Unlock" aria-label="Unlock"></button>
    </div>
    <a href="/desktop/password-recovery.html" id="forgotPassword" class="text-white text-sm mt-3 hover:underline cursor-pointer">Forgot Password?</a>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <h1>Enter fallback mode?</h1>
      <p>Fallback mode is useful if you screwed something up and have no way to recover. To exit this mode, you can press Finder > Exit fallback mode</p>
      <div class="popup-buttons">
        <button id="closePopup">No</button>
        <button id="redirectPopup">Yes</button>
      </div>
    </div>
  </div>

<script>
function updateDateTime() {
  const now = new Date();
  const date = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  const time = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date').textContent = date;
  document.getElementById('time').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 1000);

const loginBtn = document.getElementById('loginBtn');
const passwordInput = document.getElementById('loginPassword');
const unlockPill = document.getElementById('unlockPill');
const datetimeBlock = document.getElementById('datetimeBlock');
const centerStackBlock = document.getElementById('centerStackBlock');

passwordInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') attemptUnlock();
});
loginBtn.addEventListener('click', attemptUnlock);

let wrongTimeout = null;
async function attemptUnlock() {
  const pass = passwordInput.value.trim();
  if (!pass) return;
  try {
    const resp = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ password: pass })
    });
    const text = await resp.text();
    const lowered = text.toLowerCase();
    if (lowered.includes('❌') || lowered.includes('wrong') || lowered.includes('no password')) {
      showWrong();
    } else {
      // PASSWORD CORRETTA - Avvia l'effetto caduta fluida
      datetimeBlock.classList.add('unlock-falling');
      centerStackBlock.classList.add('unlock-falling');
      
      // Ritardo millimetrico controllato per far completare la caduta prima del cambio pagina
      setTimeout(() => {
        window.location.href = '/desktop/com.mariowos.desktop.html';
      }, 520);
    }
  } catch {
    showWrong();
  }
}
function showWrong() {
  unlockPill.classList.add('wrong');
  passwordInput.value = '';
  clearTimeout(wrongTimeout);
  wrongTimeout = setTimeout(() => unlockPill.classList.remove('wrong'), 1000);
  passwordInput.focus();
}
window.addEventListener('load', () => passwordInput.focus());

const popupOverlay = document.getElementById('popupOverlay');
const closePopup = document.getElementById('closePopup');
const redirectPopup = document.getElementById('redirectPopup');

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !popupOverlay.style.display) {
    e.preventDefault();
    popupOverlay.style.display = 'flex';
  }
});

closePopup.addEventListener('click', () => {
  popupOverlay.style.display = 'none';
});

redirectPopup.addEventListener('click', () => {
  window.location.href = '/desktop/fallback/com.mariowos.desktop.html';
});

fetch("/desktop/assets/wallpaper.user.png", { method: "HEAD" })
    .then(res => {
      if (res.ok) {
        document.body.style.backgroundImage = 'url("/desktop/assets/wallpaper.user.png?ts=' + Date.now() + '")';
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      } else {
        document.body.style.backgroundImage = 'url("/desktop/assets/wallpaper.png")';
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      }
    });
window.addEventListener("DOMContentLoaded", () => {
    let wallpaper = localStorage.getItem("wallpaper");
    if (!wallpaper) wallpaper = "../../../assets/wallpaper.factory.png";

    document.body.style.backgroundImage = `url('${wallpaper}')`;

    // Check for user avatar
    fetch("/desktop/assets/avatar.user.png", { method: "HEAD" })
        .then(res => {
            if (res.ok) {
                document.querySelector('.avatar').style.backgroundImage = 'url("/desktop/assets/avatar.user.png?ts=' + Date.now() + '")';
            }
        })
        .catch(() => {
            // Keep default avatar.png
        });
});

// ===== Forced Light Mode System =====
function applyForcedLightMode() {
  let lightModeStyle = document.getElementById('forced-light-mode-styles');
  if (!lightModeStyle) {
    lightModeStyle = document.createElement('style');
    lightModeStyle.id = 'forced-light-mode-styles';
    document.head.appendChild(lightModeStyle);
  }
  lightModeStyle.textContent = `
    html body { background: #f5f5f5 !important; color: #1a1a1a !important; }
    body { background: #f5f5f5 !important; }
    .datetime .date { color: #1a1a1a !important; text-shadow: none !important; }
    .datetime .time { color: #1a1a1a !important; text-shadow: none !important; }
    .avatar { box-shadow: 0 6px 18px rgba(0,0,0,0.2), inset 0 -4px 10px rgba(0,0,0,0.08) !important; }
    .unlock-pill { background: rgba(255,255,255,0.95) !important; border: 1px solid #ddd !important; box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important; }
    .unlock-pill input { background: rgba(255,255,255,0.95) !important; color: #1a1a1a !important; }
    .unlock-pill input::placeholder { color: #999 !important; }
    #loginBtn { background-color: #e0e0e0 !important; }
    #loginBtn:hover { background-color: #ccc !important; }
    #forgotPassword { color: #0066cc !important; }
    label { color: #1a1a1a !important; }
    .popup-overlay { background: rgba(0, 0, 0, 0.3) !important; }
    .popup { background: #ffffff !important; }
    .popup h1 { color: #1a1a1a !important; }
    .popup p { color: #666666 !important; }
  `;
}

function removeForcedLightMode() {
  const lightModeStyle = document.getElementById('forced-light-mode-styles');
  if (lightModeStyle) { lightModeStyle.remove(); }
}

function checkForcedLightMode() {
  if (localStorage.getItem('forcedLightMode') === 'true') { applyForcedLightMode(); }
}

window.addEventListener('storage', (e) => {
  if (e.key === 'forcedLightMode') {
    if (e.newValue === 'true') { applyForcedLightMode(); } 
    else { removeForcedLightMode(); }
  }
});

window.addEventListener('load', checkForcedLightMode);
</script>
</body>
</html>
